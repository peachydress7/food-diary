<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>吃記</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fdf6ee;--bg2:#fff9f3;--surface:#ffffff;--surface2:#fef3e8;
  --border:#f0e4d4;--border2:#e8d5c0;
  --text:#3d2e1e;--text2:#8a7060;--text3:#bca898;
  --accent:#e8825a;--accent2:#f0a882;--accent-bg:#fdeee7;
  --green:#6dba8a;--green-bg:#e8f5ed;
  --gold:#e8b84a;--gold-bg:#fdf4db;
  --blue:#6aabdc;--blue-bg:#e4f1fa;
  --pink:#e87aaa;--pink-bg:#fce8f2;
  --shadow:rgba(180,120,80,.10);--shadow2:rgba(180,120,80,.18);
  --radius:22px;--radius-sm:14px;
  --tab-h:68px;--safe-b:env(safe-area-inset-bottom,16px);
  --font:'Nunito','Noto Sans TC',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);overflow:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 10% 20%,rgba(232,130,90,.07) 0%,transparent 50%),radial-gradient(ellipse at 90% 80%,rgba(109,186,138,.06) 0%,transparent 50%);pointer-events:none;z-index:0;}
#app{height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative;}
.page{display:none;flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;position:relative;z-index:1;padding-bottom:calc(var(--tab-h) + var(--safe-b) + 20px);scrollbar-width:none;}
.page::-webkit-scrollbar{display:none;}
.page.active{display:block;}

/* tabbar */
.tabbar{position:fixed;bottom:0;left:0;right:0;height:calc(var(--tab-h) + var(--safe-b));padding-bottom:var(--safe-b);background:rgba(253,246,238,.94);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1.5px solid var(--border);display:flex;align-items:flex-start;padding-top:8px;z-index:100;}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:6px 4px;border-radius:12px;transition:all .2s;position:relative;}
.tab-icon{font-size:1.4rem;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.tab-label{font-size:.58rem;font-weight:700;color:var(--text3);transition:color .2s;letter-spacing:.04em;}
.tab.active .tab-icon{transform:scale(1.18) translateY(-2px);}
.tab.active .tab-label{color:var(--accent);}
.tab-pip{position:absolute;top:3px;width:18px;height:3px;background:var(--accent);border-radius:999px;opacity:0;transition:opacity .2s;}
.tab.active .tab-pip{opacity:1;}

/* FAB */
.fab{position:fixed;bottom:calc(var(--tab-h) + var(--safe-b) + 14px);right:18px;width:54px;height:54px;border-radius:999px;background:linear-gradient(135deg,var(--accent),#d96840);border:none;color:white;font-size:1.7rem;font-family:var(--font);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 4px 20px rgba(232,130,90,.4),0 2px 8px rgba(0,0,0,.1);z-index:99;transition:transform .3s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;line-height:1;}
.fab:active{transform:scale(.92);}
.fab.rot{transform:rotate(45deg);}

/* header */
.page-header{padding:52px 20px 10px;position:sticky;top:0;z-index:10;background:linear-gradient(to bottom,var(--bg) 65%,transparent);}
.page-title{font-size:1.9rem;font-weight:800;letter-spacing:-.01em;line-height:1.15;}
.page-sub{font-size:.78rem;color:var(--text3);margin-top:3px;font-weight:500;}

/* date nav */
.date-nav{display:flex;align-items:center;gap:8px;margin:8px 20px 14px;}
.darr{width:34px;height:34px;border-radius:999px;background:var(--surface);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;color:var(--text2);flex-shrink:0;transition:all .2s;box-shadow:0 1px 4px var(--shadow);}
.darr:active{transform:scale(.9);}
.dpill{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:999px;padding:8px 14px;text-align:center;font-size:.83rem;font-weight:700;cursor:pointer;color:var(--text);position:relative;overflow:hidden;box-shadow:0 1px 4px var(--shadow);}
.dpill input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;}
.dpill.today{border-color:var(--accent);color:var(--accent);}

/* user switcher */
.user-bar{display:flex;gap:8px;margin:0 20px 14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.user-bar::-webkit-scrollbar{display:none;}
.upill{padding:7px 16px;border-radius:999px;border:1.5px solid var(--border);font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;color:var(--text2);background:var(--surface);}
.upill.active{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}

/* calorie ring */
.cal-card{margin:0 20px 14px;background:linear-gradient(135deg,#fff5ee,#ffeedd);border:1.5px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:0 3px 16px var(--shadow);display:flex;align-items:center;gap:18px;}
.cal-ring{width:84px;height:84px;flex-shrink:0;position:relative;display:flex;align-items:center;justify-content:center;}
.cal-ring svg{position:absolute;inset:0;transform:rotate(-90deg);}
.ring-bg{fill:none;stroke:#eddcc8;stroke-width:7;}
.ring-fg{fill:none;stroke:var(--accent);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset .7s cubic-bezier(.4,0,.2,1);}
.cal-inner{text-align:center;z-index:1;}
.cal-num{font-size:1.25rem;font-weight:800;color:var(--text);line-height:1;}
.cal-unit{font-size:.52rem;color:var(--text2);font-weight:600;letter-spacing:.04em;}
.meal-stats{flex:1;display:flex;flex-direction:column;gap:8px;}
.ms-row{display:flex;align-items:center;gap:8px;}
.ms-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.ms-name{font-size:.73rem;color:var(--text2);flex:1;font-weight:600;}
.ms-val{font-size:.82rem;font-weight:800;}

/* calendar */
.cal-wrap{margin:0 20px 14px;}
.cal-section{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px;box-shadow:0 2px 12px var(--shadow);}
.cal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.cal-month{font-size:1rem;font-weight:800;}
.cal-nav{display:flex;gap:6px;}
.cal-nav button{width:30px;height:30px;border-radius:999px;border:1.5px solid var(--border);background:var(--bg2);font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);transition:all .2s;font-family:var(--font);}
.cal-nav button:active{transform:scale(.9);}
.cal-dow{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:6px;}
.cal-dow span{text-align:center;font-size:.62rem;font-weight:700;color:var(--text3);padding:4px 0;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;}
.cal-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:10px;cursor:pointer;transition:all .2s;position:relative;gap:1px;}
.cal-cell:active{transform:scale(.9);}
.cal-cell .cnum{font-size:.78rem;font-weight:700;color:var(--text2);}
.cal-cell.other .cnum{color:var(--text3);}
.cal-cell.today{background:var(--accent-bg);}
.cal-cell.today .cnum{color:var(--accent);}
.cal-cell.selected{background:var(--accent);border-radius:12px;}
.cal-cell.selected .cnum{color:#fff;}
.cal-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);}
.cal-cell.selected .cal-dot{background:rgba(255,255,255,.8);}

/* food items */
.meal-group{margin:0 20px 10px;}
.mg-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;padding:0 2px;}
.mg-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;display:flex;align-items:center;gap:5px;}
.mg-cal{font-size:.7rem;color:var(--text3);font-weight:600;}
.food-item{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;margin-bottom:6px;display:flex;align-items:center;gap:11px;box-shadow:0 1px 6px var(--shadow);animation:slideUp .25s ease;}
@keyframes slideUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.food-ico{width:40px;height:40px;border-radius:11px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;border:1px solid var(--border);}
.food-info{flex:1;min-width:0;}
.food-name{font-size:.88rem;font-weight:700;white-space:normal;word-break:break-word;}
.food-meta{font-size:.68rem;color:var(--text2);margin-top:2px;display:flex;align-items:center;gap:5px;font-weight:500;}
.food-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0;}
.food-cal{font-size:.95rem;font-weight:800;color:var(--accent);}
.food-cal-u{font-size:.55rem;color:var(--text3);font-weight:600;}
.del-btn{width:26px;height:26px;border-radius:999px;border:none;background:var(--pink-bg);color:var(--pink);font-size:.65rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.del-btn:active{transform:scale(.88);}
.food-photos{display:flex;gap:4px;margin-top:7px;}
.food-photos img{width:46px;height:46px;border-radius:9px;object-fit:cover;border:1.5px solid var(--border);cursor:pointer;transition:transform .15s;}
.food-photos img:active{transform:scale(.93);}
/* lightbox */
#lightbox{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.88);display:none;align-items:center;justify-content:center;animation:bfin .2s ease;}
#lightbox.open{display:flex;}
#lightbox img{max-width:95vw;max-height:90dvh;border-radius:14px;object-fit:contain;box-shadow:0 8px 48px rgba(0,0,0,.5);}

/* empty / loading */
.empty{text-align:center;padding:52px 28px;color:var(--text3);}
.empty-e{font-size:3.2rem;display:block;margin-bottom:14px;}
.empty-t{font-size:.95rem;font-weight:700;color:var(--text2);margin-bottom:6px;}
.empty-s{font-size:.78rem;line-height:1.7;font-weight:500;}
.loading{text-align:center;padding:40px;color:var(--text3);font-size:.85rem;font-weight:600;}
.loading span{display:inline-block;animation:spin 1s linear infinite;font-size:1.4rem;}
@keyframes spin{to{transform:rotate(360deg);}}

/* add sheet */
#addSheet{position:fixed;inset:0;z-index:200;display:none;flex-direction:column;}
#addSheet.open{display:flex;}
.s-backdrop{position:absolute;inset:0;background:rgba(60,40,20,.45);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);animation:bfin .2s ease;}
@keyframes bfin{from{opacity:0;}to{opacity:1;}}
.s-body{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-radius:28px 28px 0 0;border-top:2px solid var(--border);padding-bottom:calc(var(--safe-b)+16px);max-height:93dvh;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:sup .35s cubic-bezier(.32,.72,0,1);scrollbar-width:none;}
.s-body::-webkit-scrollbar{display:none;}
@keyframes sup{from{transform:translateY(100%);}to{transform:translateY(0);}}
.s-handle{width:34px;height:4px;background:var(--border2);border-radius:999px;margin:12px auto 6px;}
.s-title{font-size:1.25rem;font-weight:800;text-align:center;padding:6px 20px 18px;}
.f-sec{padding:0 20px;margin-bottom:18px;}
.f-lbl{font-size:.65rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:9px;display:block;}
.f-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;font-family:var(--font);font-size:.92rem;font-weight:500;color:var(--text);outline:none;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
.f-input::placeholder{color:var(--text3);}
.f-input:focus{border-color:var(--accent);}
textarea.f-input{resize:none;min-height:68px;line-height:1.6;}
.f-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.mpills{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none;}
.mpills::-webkit-scrollbar{display:none;}
.mpill{padding:9px 17px;border-radius:999px;border:1.5px solid var(--border);font-size:.8rem;font-weight:700;cursor:pointer;white-space:nowrap;transition:all .2s;color:var(--text2);background:var(--surface);flex-shrink:0;}
.mpill.s-b{background:var(--gold-bg);border-color:var(--gold);color:var(--gold);}
.mpill.s-l{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.mpill.s-d{background:var(--accent-bg);border-color:var(--accent);color:var(--accent);}
.mpill.s-s{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}
.mood-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:7px;}
.mbtn{aspect-ratio:1;border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--surface);display:flex;flex-direction:column;align-items:center;justify-content:center;cursor:pointer;font-size:1.35rem;transition:all .2s cubic-bezier(.34,1.56,.64,1);gap:2px;}
.mbtn span{font-size:.48rem;color:var(--text3);font-weight:700;}
.mbtn.active{border-color:var(--accent);background:var(--accent-bg);transform:scale(1.07);}
.photo-zone{border:1.5px dashed var(--border2);border-radius:var(--radius-sm);padding:18px;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;background:var(--surface);transition:all .2s;}
.photo-zone:active{background:var(--surface2);border-color:var(--accent);}
.photo-zone input{display:none;}
.p-thumbs{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.p-thumbs img{width:60px;height:60px;border-radius:10px;object-fit:cover;border:1.5px solid var(--border);}
.s-btn{margin:4px 20px 0;width:calc(100% - 40px);padding:15px;border-radius:var(--radius-sm);border:none;background:linear-gradient(135deg,var(--accent),#d96840);color:white;font-family:var(--font);font-size:.98rem;font-weight:800;cursor:pointer;box-shadow:0 4px 18px rgba(232,130,90,.35);transition:transform .2s;letter-spacing:.02em;}
.s-btn:active{transform:scale(.97);}
.s-btn:disabled{opacity:.6;transform:none;}

/* report */
.range-btns{display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;padding:0 20px;}
.range-btns::-webkit-scrollbar{display:none;}
.rbtn{padding:8px 18px;border-radius:999px;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;font-family:var(--font);}
.rbtn.active{background:var(--accent);border-color:var(--accent);color:white;}
.stat-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 20px 12px;}
.stile{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:15px;box-shadow:0 2px 10px var(--shadow);}
.stlbl{font-size:.63rem;color:var(--text3);font-weight:800;text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.stnum{font-size:1.55rem;font-weight:800;line-height:1;}
.stunit{font-size:.68rem;color:var(--text2);font-weight:500;}
.stsub{font-size:.68rem;color:var(--text3);margin-top:4px;font-weight:500;}
.chart-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:18px;margin:0 20px 12px;box-shadow:0 2px 10px var(--shadow);}
.cc-title{font-size:.68rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;}
.bar-chart{display:flex;align-items:flex-end;gap:4px;height:90px;}
.bcw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;height:100%;justify-content:flex-end;}
.bcbar{width:100%;background:var(--surface2);border-radius:5px 5px 0 0;transition:height .5s cubic-bezier(.4,0,.2,1);min-height:2px;border:1px solid var(--border);}
.bcbar.hd{background:linear-gradient(to top,var(--accent),var(--accent2));border:none;}
.bcval{font-size:.52rem;color:var(--text3);font-weight:600;}
.bclbl{font-size:.55rem;color:var(--text3);font-weight:600;}
.mb-list{display:flex;flex-direction:column;gap:11px;}
.mb-item{display:flex;flex-direction:column;gap:4px;}
.mb-hdr{display:flex;justify-content:space-between;}
.mb-name{font-size:.78rem;font-weight:700;display:flex;align-items:center;gap:5px;}
.mb-cal{font-size:.72rem;color:var(--text2);font-weight:600;}
.mb-track{height:7px;background:var(--surface2);border-radius:999px;overflow:hidden;border:1px solid var(--border);}
.mb-fill{height:100%;border-radius:999px;transition:width .6s cubic-bezier(.4,0,.2,1);}
.tf-list{display:flex;flex-direction:column;gap:7px;}
.tf-item{display:flex;align-items:center;gap:11px;padding:11px 13px;background:var(--surface2);border-radius:var(--radius-sm);border:1.5px solid var(--border);}
.tf-rank{width:20px;font-size:.72rem;font-weight:800;color:var(--text3);text-align:center;flex-shrink:0;}
.tf-rank.g1{color:var(--gold);}
.tf-name{flex:1;font-size:.85rem;font-weight:700;}
.tf-cnt{font-size:.68rem;color:var(--text2);font-weight:500;}
.tf-cal{font-size:.8rem;font-weight:800;color:var(--accent);flex-shrink:0;}
.mood-tl{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;}
.mood-tl::-webkit-scrollbar{display:none;}
.mtd{display:flex;flex-direction:column;align-items:center;gap:3px;flex-shrink:0;}
.mtd-b{width:38px;height:38px;border-radius:999px;background:var(--surface2);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:1.15rem;}
.mtd-l{font-size:.56rem;color:var(--text3);font-weight:600;}

/* skeleton */
.skel{background:linear-gradient(90deg,var(--surface2) 25%,var(--border) 50%,var(--surface2) 75%);background-size:200% 100%;animation:skel-shine 1.4s ease infinite;border-radius:8px;}
@keyframes skel-shine{0%{background-position:200% 0}100%{background-position:-200% 0}}
.skel-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:0 20px 12px;}
.skel-tile{height:86px;border-radius:var(--radius-sm);}
.skel-chart{height:130px;margin:0 20px 12px;border-radius:var(--radius);}
.skel-chart.sm{height:90px;}

/* settings */
.set-section{padding:0 20px;margin-bottom:24px;}
.set-label{font-size:.7rem;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;display:block;}
.set-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);overflow:hidden;box-shadow:0 2px 10px var(--shadow);}
.set-row{display:flex;align-items:center;gap:14px;padding:15px 16px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.set-row:last-child{border-bottom:none;}
.set-row:active{background:var(--surface2);}
.set-row input{display:none;}
.set-ico{font-size:1.3rem;flex-shrink:0;}
.set-info{flex:1;}
.set-title{font-size:.88rem;font-weight:700;}
.set-sub{font-size:.72rem;color:var(--text2);margin-top:2px;font-weight:500;}
.set-arrow{font-size:.9rem;color:var(--text3);}
.user-name-input{width:100%;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:13px 15px;font-family:var(--font);font-size:.92rem;font-weight:600;color:var(--text);outline:none;transition:border-color .2s;}
.user-name-input:focus{border-color:var(--accent);}
.save-name-btn{margin-top:8px;padding:11px 24px;border-radius:var(--radius-sm);border:none;background:var(--accent);color:white;font-family:var(--font);font-size:.88rem;font-weight:700;cursor:pointer;transition:all .2s;}
.save-name-btn:active{transform:scale(.97);}

/* AI suggest button */
.ai-btn{padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--accent);background:var(--accent-bg);color:var(--accent);font-family:var(--font);font-size:.78rem;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .2s;}
.ai-btn:active{transform:scale(.95);}
.ai-btn:disabled{opacity:.5;cursor:not-allowed;transform:none;}
/* goal warning */
.goal-warning{margin:0 20px 10px;background:#fde8e8;border:1.5px solid #f0b0b0;border-radius:var(--radius-sm);padding:10px 14px;font-size:.8rem;font-weight:700;color:#c0392b;display:none;text-align:center;}
.goal-warning.show{display:block;}

/* toast */

<body>
<div id="app">

        <div class="ms-row"><div class="ms-dot" style="background:var(--gold)"></div><div class="ms-name" id="msName0">早餐</div><div class="ms-val" id="ms0" style="color:var(--gold)">0</div></div>

        <div class="ms-row"><div class="ms-dot" style="background:var(--blue)"></div><div class="ms-name" id="msName3">點心</div><div class="ms-val" id="ms3" style="color:var(--blue)">0</div></div>
      </div>
    </div>

    <div class="cal-wrap">
      <div class="cal-section">
        <div class="cal-header">
          <div class="cal-month" id="calMonth"></div>

            <button onclick="calNav(1)">›</button>

function todayStr(){ return new Date().toISOString().split('T')[0]; }

// ── API calls ──
async function apiGet(date, user){
  try {
    const r = await fetch(`${API_BASE}/api/entries?date=${date}&user=${encodeURIComponent(user)}`);
    if(!r.ok) throw new Error('fetch failed');
    return await r.json();
  } catch(e) {
    // fallback to localStorage if offline
    const all = JSON.parse(localStorage.getItem('chitji_offline')||'{}');
    return (all[user]?.[date]) || [];
  }
}
async function apiPost(entry, user){
  const r = await fetch(`${API_BASE}/api/entries`, {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({entry, user})
  });
  if(!r.ok) throw new Error('save failed');
  return await r.json();
}
async function apiDelete(id){
  const r = await fetch(`${API_BASE}/api/entries?id=${id}`, {method:'DELETE'});
  if(!r.ok) throw new Error('delete failed');
}

function changeDay(d){
  const dt=new Date(cur+'T00:00:00'); dt.setDate(dt.getDate()+d);
  cur=dt.toISOString().split('T')[0];
  const dd=new Date(cur+'T00:00:00');
  calViewYear=dd.getFullYear(); calViewMonth=dd.getMonth();
  renderLog();
}

// ── Calendar ──
function calNav(d){
  calViewMonth+=d;
  if(calViewMonth>11){calViewMonth=0;calViewYear++;}
  if(calViewMonth<0){calViewMonth=11;calViewYear--;}
  renderCalendar();
}
function renderCalendar(){
  const mn=T.months;
  const y=calViewYear, m=calViewMonth;
  document.getElementById('calMonth').textContent=`${y}年 ${mn[m]}`;
  const firstDay=new Date(y,m,1).getDay();
  const daysInMonth=new Date(y,m+1,0).getDate();
  const daysInPrev=new Date(y,m,0).getDate();
  const today=todayStr();
  let html='';
  for(let i=firstDay-1;i>=0;i--) html+=`<div class="cal-cell other"><span class="cnum">${daysInPrev-i}</span></div>`;
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isT=ds===today, isS=ds===cur;
    const hasD=(cachedEntries[ds]||[]).length>0;
    let cls='cal-cell'+(isT&&!isS?' today':'')+(isS?' selected':'')+(hasD?' has-data':'');
    html+=`<div class="${cls}" onclick="selectDate('${ds}')"><span class="cnum">${d}</span>${hasD?'<div class="cal-dot"></div>':''}</div>`;
  }
  const rem=(7-((firstDay+daysInMonth)%7))%7;
  for(let i=1;i<=rem;i++) html+=`<div class="cal-cell other"><span class="cnum">${i}</span></div>`;
  document.getElementById('calGrid').innerHTML=html;
}

function handlePhotos(e){
  Array.from(e.target.files).forEach(f=>{
    const url=URL.createObjectURL(f);
    const img=new Image();
    img.onload=()=>{
      const MAX=800,Q=0.7;
      let w=img.width,h=img.height;
      if(w>MAX||h>MAX){if(w>h){h=Math.round(h*MAX/w);w=MAX;}else{w=Math.round(w*MAX/h);h=MAX;}}
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      pendingPhotos.push(c.toDataURL('image/jpeg',Q));
      URL.revokeObjectURL(url);
      renderThumbs();
    };
    img.src=url;
  });
}
function renderThumbs(){
  document.getElementById('pThumbs').innerHTML=pendingPhotos.map((s,i)=>`<img src="${s}" onclick="pendingPhotos.splice(${i},1);renderThumbs()">`).join('');
}
async function saveEntry(){
  const name=document.getElementById('iName').value.trim();
  if(!name){showToast(T.toastNoFoodName);return;}
  const btn=document.getElementById('saveBtn');
  btn.disabled=true; btn.textContent=T.saving;
  const entry={
    meal:selMeal, name, date:cur,
    cal:parseInt(document.getElementById('iCal').value)||0,
    portion:document.getElementById('iPortion').value.trim(),
    notes:document.getElementById('iNotes').value.trim(),
    mood:selMood, photos:[...pendingPhotos],
    time:new Date().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'})
  };
  try{
    await apiPost(entry, curUser);
    showToast(T.toastSaved);
  }catch(e){
    // offline fallback
    const all=JSON.parse(localStorage.getItem('chitji_offline')||'{}');
    if(!all[curUser]) all[curUser]={};
    if(!all[curUser][cur]) all[curUser][cur]=[];
    entry.id=Date.now();
    all[curUser][cur].push(entry);
    localStorage.setItem('chitji_offline',JSON.stringify(all));
    showToast(T.toastSavedOffline);
  }
  // clear form
  document.getElementById('iName').value='';document.getElementById('iCal').value='';
  document.getElementById('iPortion').value='';document.getElementById('iNotes').value='';
  document.getElementById('iPhoto').value='';
  pendingPhotos=[];renderThumbs();selMood='😊';
  document.querySelectorAll('.mbtn').forEach((b,i)=>b.classList.toggle('active',i===0));
  btn.disabled=false; btn.textContent=T.saveEntry;
  delete cachedEntries[cur];
  closeSheet(); renderLog();
}
async function deleteEntry(id){
  if(!confirm(T.deleteConfirm)) return;
  try{ await apiDelete(id); }catch(e){
    const all=JSON.parse(localStorage.getItem('chitji_offline')||'{}');
    if(all[curUser]?.[cur]) all[curUser][cur]=all[curUser][cur].filter(e=>e.id!==id);
    localStorage.setItem('chitji_offline',JSON.stringify(all));
  }
  delete cachedEntries[cur];
  renderLog(); showToast(T.toastDeleted);
}

// ── Render Log ──
async function renderLog(){
  const d=new Date(cur+'T00:00:00'), isToday=cur===todayStr();
  const locale=lang==='en'?'en-US':'zh-TW';
  const opts={month:'long',day:'numeric',weekday:'short'};
  document.getElementById('hdrSub').textContent=isToday?T.today+' · '+d.toLocaleDateString(locale,{month:'numeric',day:'numeric'}):d.toLocaleDateString(locale,opts);
  document.getElementById('dpillTxt').textContent=isToday?T.today:d.toLocaleDateString(locale,{month:'numeric',day:'numeric',weekday:'short'});
  document.getElementById('dpill').classList.toggle('today',isToday);
  document.getElementById('datePicker').value=cur;
  renderUserBar();

  document.getElementById('logList').innerHTML=`<div class="loading"><span>🍽</span><br>${T.loading}</div>`;

  // fetch
  if(!cachedEntries[cur]){
    cachedEntries[cur] = await apiGet(cur, curUser);
  }
  const entries = cachedEntries[cur] || [];

  // calorie ring
  const totalCal=entries.reduce((s,e)=>s+(e.calories||e.cal||0),0);
  const goal=getGoal();
  document.getElementById('calNum').textContent=totalCal.toLocaleString();
  const pct=Math.min(totalCal/goal,1);
  const exceeded=totalCal>goal;
  document.getElementById('ringFg').style.strokeDashoffset=219.9-(219.9*pct);
  document.getElementById('ringFg').style.stroke=exceeded?'#e74c3c':'var(--accent)';
  const gw=document.getElementById('goalWarning');
  if(exceeded){gw.textContent=T.goalWarning(goal,totalCal);gw.classList.add('show');}
  else{gw.classList.remove('show');}
  const meals=['早餐','午餐','晚餐','點心'];
  meals.forEach((m,i)=>{
    document.getElementById('ms'+i).textContent=entries.filter(e=>e.meal===m).reduce((s,e)=>s+(e.calories||e.cal||0),0);
  });

  // list
  const grouped={};
  entries.forEach(e=>{if(!grouped[e.meal])grouped[e.meal]=[];grouped[e.meal].push(e);});
  const colors={早餐:'var(--gold)',午餐:'var(--green)',晚餐:'var(--accent)',點心:'var(--blue)'};
  let html='';
  if(!entries.length){
    html=`<div class="empty"><span class="empty-e">🌸</span><div class="empty-t">${T.emptyTitle}</div><div class="empty-s">${T.emptySub}</div></div>`;
  } else {
    const ZH_MEALS=STRINGS.zh.meals;
    ZH_MEALS.forEach((meal,mi)=>{
      if(!grouped[meal]) return;
      const mc=grouped[meal].reduce((s,e)=>s+(e.calories||e.cal||0),0);
      html+=`<div class="meal-group"><div class="mg-hdr"><div class="mg-title" style="color:${colors[meal]}">${mealEmoji(meal)} ${T.meals[mi]}</div><div class="mg-cal">${mc} kcal</div></div>`;
      grouped[meal].forEach(e=>{
        const cal=e.calories||e.cal||0;
        const photos=e.photos&&e.photos.length?`<div class="food-photos">${e.photos.map(p=>`<img src="${p}" onclick="openLightbox(this.src)">`).join('')}</div>`:'';
        html+=`<div class="food-item">
          <div class="food-ico">${foodEmoji(e.name)}</div>
          <div class="food-info">
            <div class="food-name">${e.name}</div>
            <div class="food-meta">${e.entry_time||e.time?`<span>${e.entry_time||e.time}</span>`:''} ${e.portion?`<span>· ${e.portion}</span>`:''} <span>${e.mood}</span></div>
            ${e.notes?`<div style="font-size:.7rem;color:var(--text3);margin-top:3px;font-weight:500;">${e.notes}</div>`:''}${photos}
          </div>
          <div class="food-right">
            <div><span class="food-cal">${cal}</span><span class="food-cal-u"> kcal</span></div>
            <button class="del-btn" onclick="deleteEntry(${e.id})">✕</button>
          </div>
        </div>`;
      });
      html+='</div>';
    });
  }
  document.getElementById('logList').innerHTML=html;
  renderCalendar();
}

// ── Report ──
let reportRange=7;
function setRange(days,btn){
  document.querySelectorAll('.rbtn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  reportRange=days;
  renderReport(days);
}
function reportSkeleton(){
  return `<div class="skel-row"><div class="skel skel-tile"></div><div class="skel skel-tile"></div></div>`+
    `<div class="skel skel-chart"></div><div class="skel skel-chart sm"></div>`+
    `<div class="skel skel-chart sm"></div><div class="skel skel-chart sm"></div>`;
}
async function renderReport(days){
  const rc=document.getElementById('reportContent');
  rc.innerHTML=reportSkeleton();

  // 收集需要的日期
  const end=new Date(), start=new Date();
  start.setDate(start.getDate()-days+1);
  const dates=[];
  const d=new Date(start);
  while(d<=end){ dates.push(d.toISOString().split('T')[0]); d.setDate(d.getDate()+1); }

  // 只 fetch 尚未快取的日期（平行發出）
  await Promise.all(dates.filter(k=>!cachedEntries[k]).map(async k=>{ cachedEntries[k]=await apiGet(k,curUser); }));
  const dayList=dates.map(k=>({date:k,entries:cachedEntries[k]||[]}));

  // 計算統計
  const allE=dayList.flatMap(d=>d.entries);
  const cal=e=>e.calories||e.cal||0;
  const totalCal=allE.reduce((s,e)=>s+cal(e),0);
  const dwd=dayList.filter(d=>d.entries.length).length||1;
  const avgCal=Math.round(totalCal/dwd);
  const maxDay=Math.max(...dayList.map(d=>d.entries.reduce((s,e)=>s+cal(e),0)),1);
  const moodCnt={};
  allE.forEach(e=>{moodCnt[e.mood]=(moodCnt[e.mood]||0)+1;});
  const topMood=Object.entries(moodCnt).sort((a,b)=>b[1]-a[1])[0];
  const mCalMap={早餐:0,午餐:0,晚餐:0,點心:0};
  allE.forEach(e=>{mCalMap[e.meal]=(mCalMap[e.meal]||0)+cal(e);});
  const totalM=Object.values(mCalMap).reduce((s,v)=>s+v,0)||1;
  const fmap={};
  allE.forEach(e=>{if(!fmap[e.name])fmap[e.name]={cnt:0,tc:0};fmap[e.name].cnt++;fmap[e.name].tc+=cal(e);});
  const tops=Object.entries(fmap).sort((a,b)=>b[1].cnt-a[1].cnt).slice(0,5);
  const mbColors={早餐:'var(--gold)',午餐:'var(--green)',晚餐:'var(--accent)',點心:'var(--blue)'};

  // 非同步分段渲染，避免長時間阻塞主執行緒
  const defer=ms=>new Promise(r=>setTimeout(r,ms));

  // 第一段：統計卡
  rc.innerHTML=`<div class="stat-row"><div class="stile"><div class="stlbl">${T.avgPerDay}</div><div class="stnum">${avgCal.toLocaleString()}<span class="stunit"> kcal</span></div><div class="stsub">${T.recordCount(allE.length)}</div></div><div class="stile"><div class="stlbl">${T.topMood}</div><div class="stnum" style="font-size:2rem">${topMood?topMood[0]:'—'}</div><div class="stsub">${topMood?T.timesStr(topMood[1]):T.noData}</div></div></div>`+
    `<div id="rc-bars" class="skel skel-chart"></div>`+
    `<div id="rc-meals" class="skel skel-chart sm"></div>`+
    `<div id="rc-mood" class="skel skel-chart sm"></div>`+
    `<div id="rc-top" class="skel skel-chart sm"></div>`;

  await defer(0);
  const bars=dayList.map(d=>{const c=d.entries.reduce((s,e)=>s+cal(e),0);const h=Math.round((c/maxDay)*100);return `<div class="bcw"><div class="bcval">${c>0?c:''}</div><div class="bcbar ${c>0?'hd':''}" style="height:${h}%;min-height:${c>0?3:0}px"></div><div class="bclbl">${d.date.slice(5)}</div></div>`;}).join('');
  document.getElementById('rc-bars').outerHTML=`<div class="chart-card"><div class="cc-title">${T.chartCalTrend}</div><div class="bar-chart">${bars}</div></div>`;

  await defer(0);
  const mbHTML=Object.entries(mCalMap).map(([m,c])=>{const pct=Math.round((c/totalM)*100);const mi=STRINGS.zh.meals.indexOf(m);const dn=mi>=0?T.meals[mi]:m;return `<div class="mb-item"><div class="mb-hdr"><div class="mb-name" style="color:${mbColors[m]}">${mealEmoji(m)} ${dn}</div><div class="mb-cal">${c} kcal</div></div><div class="mb-track"><div class="mb-fill" style="width:${pct}%;background:${mbColors[m]}"></div></div></div>`;}).join('');
  document.getElementById('rc-meals').outerHTML=`<div class="chart-card"><div class="cc-title">${T.chartMealDist}</div><div class="mb-list">${mbHTML}</div></div>`;

  await defer(0);
  const moodTL=dayList.slice(-7).map(d=>{const last=d.entries.length?d.entries[d.entries.length-1].mood:'·';return `<div class="mtd"><div class="mtd-b">${last}</div><div class="mtd-l">${d.date.slice(5)}</div></div>`;}).join('');
  document.getElementById('rc-mood').outerHTML=`<div class="chart-card"><div class="cc-title">${T.chartMoodHistory}</div><div class="mood-tl">${moodTL}</div></div>`;

  await defer(0);
  const tfHTML=tops.length?tops.map(([n,i],idx)=>`<div class="tf-item"><div class="tf-rank ${idx===0?'g1':''}">${String(idx+1).padStart(2,'0')}</div><div class="tf-name">${n}</div><div class="tf-cnt">${i.cnt}${T.timesUnit}</div><div class="tf-cal">${Math.round(i.tc/i.cnt)} kcal</div></div>`).join(''):`<div style="color:var(--text3);font-size:.8rem;text-align:center;padding:16px;font-weight:600;">${T.noFoodData}</div>`;
  document.getElementById('rc-top').outerHTML=`<div class="chart-card"><div class="cc-title">${T.chartTopFoods}</div><div class="tf-list">${tfHTML}</div></div>`;
}

async function exportJSON(){
  showToast('準備備份中…');
  // fetch all data for current user
  const result={version:2,user:curUser,exported:new Date().toISOString(),entries:{}};
  const all=JSON.parse(localStorage.getItem('chitji_offline')||'{}');
  result.entries=all[curUser]||{};
  const blob=new Blob([JSON.stringify(result,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url;
  a.download=`吃記備份_${curUser}_${todayStr()}.json`;
  a.click(); URL.revokeObjectURL(url);
  showToast('✓ 備份已下載！');
}
function importJSON(e){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const parsed=JSON.parse(ev.target.result);
      if(!confirm(`確定還原備份？\n這會覆蓋目前的資料！`)) return;
      const all=JSON.parse(localStorage.getItem('chitji_offline')||'{}');
      all[curUser]=parsed.entries||parsed.data||{};
      localStorage.setItem('chitji_offline',JSON.stringify(all));
      cachedEntries={}; renderLog(); renderDataStats();
      showToast('✓ 資料已還原！');
    }catch(err){ showToast('❌ 備份檔案格式錯誤'); }
  };
  r.readAsText(file); e.target.value='';
}
function renderDataStats(){
  const all=JSON.parse(localStorage.getItem('chitji_offline')||'{}');
  const userData=all[curUser]||{};
  const dates=Object.keys(userData);
  const total=Object.values(userData).reduce((s,v)=>s+v.length,0);
  const uname=curUser==='default'?T.me:curUser;
  document.getElementById('dataStats').innerHTML=`${T.curUser(uname)}<br>${T.recordDays(dates.length)}<br>${T.totalRecords(total)}<br>${T.earliest(dates.sort()[0]||'—')}`;
}

// ── Helpers ──
function mealEmoji(m){return{早餐:'🌅',午餐:'☀️',晚餐:'🌙',點心:'🍪'}[m]||'🍽';}
function foodEmoji(name){
  const map=[['咖啡','☕'],['奶茶','🧋'],['茶','🍵'],['水','💧'],['果汁','🧃'],['酒','🍺'],['飯','🍚'],['麵','🍜'],['粥','🥣'],['壽司','🍣'],['麵包','🍞'],['吐司','🍞'],['蛋','🥚'],['雞','🍗'],['豬','🥩'],['牛','🥩'],['魚','🐟'],['海鮮','🦐'],['沙拉','🥗'],['蔬菜','🥦'],['水果','🍎'],['蘋果','🍎'],['香蕉','🍌'],['番茄','🍅'],['漢堡','🍔'],['薯條','🍟'],['披薩','🍕'],['三明治','🥪'],['蛋糕','🎂'],['餅乾','🍪'],['冰淇淋','🍦'],['布丁','🍮'],['火鍋','🍲'],['便當','🍱'],['炒飯','🍳'],['湯','🥣'],['豆腐','🥢'],['泡麵','🍜']];
  for(const [k,e] of map){if(name.includes(k))return e;}
  return '🍽';
}

// ── API Key ──
function saveApiKey(){
  const val=document.getElementById('apiKeyInput').value.trim();
  if(!val){showToast('請輸入 API 金鑰');return;}
  localStorage.setItem('chitji_api_key',val);
  showToast('✓ API 金鑰已儲存！');
}
function getApiKey(){
  let key=localStorage.getItem('chitji_api_key');
  if(!key){
    key=prompt('請輸入你的 Anthropic API 金鑰（sk-ant-…）\n（儲存於本機，不會上傳至伺服器）');
    if(key&&key.trim()){
      localStorage.setItem('chitji_api_key',key.trim());
      return key.trim();
    }
    return null;
  }
  return key;
}

// ── AI Suggest Calories ──
async function askAiCalories(){
  const name=document.getElementById('iName').value.trim();
  if(!name){showToast(T.toastAiNoName);return;}
  const portion=document.getElementById('iPortion').value.trim();
  const btn=document.getElementById('aiBtn');
  btn.disabled=true; btn.textContent=T.aiLoading;
  try{
    const res=await fetch('/api/calories',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name,portion})
    });
    if(!res.ok){
      const err=await res.json().catch(()=>({}));
      throw new Error(err.error||`HTTP ${res.status}`);
    }
    const data=await res.json();
    const cal=data.calories;
    if(!cal||isNaN(cal)) throw new Error('無法解析回應');
    document.getElementById('iCal').value=cal;
    showToast(T.toastAiSuggest(cal));
  }catch(e){
    showToast(T.toastAiError(e.message));
  }finally{
    btn.disabled=false; btn.textContent=T.aiBtn;
  }
}

// ── Lightbox ──
function openLightbox(src){
  document.getElementById('lightboxImg').src=src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightboxImg').src='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeLightbox(); });
